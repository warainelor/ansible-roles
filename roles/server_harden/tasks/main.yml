---
- name: Update system packages
  ansible.builtin.apt:
    update_cache: yes
    upgrade: dist
  become: true
  register: upgrade_result

- name: Set reboot flag if needed
  set_fact:
    reboot_required: true
  when: upgrade_result is changed

- name: Reboot after upgrade (if required)
  ansible.builtin.reboot:
    reboot_timeout: 300
    connect_timeout: 20
    msg: "Rebooting server after system upgrade"
  become: true
  when: reboot_required | default(false)

- name: Confirm system is back online
  ansible.builtin.ping:
  register: ping_status
  until: ping_status is success
  retries: 15
  delay: 20

- name: Create new user
  ansible.builtin.user:
    name: "{{ new_user }}"
    groups: "{{ user_group }}"
    shell: "{{ user_shell }}"
    create_home: yes
  become: true

- name: Debug — Show created user information
  ansible.builtin.debug:
    msg: |
      User created successfully:
      - Username: {{ new_user }}
      - Group: {{ user_group }}
      - Shell: {{ user_shell }}
  run_once: true
  when: new_user is defined

- name: Create .ssh directory for user
  ansible.builtin.file:
    path: "/home/{{ new_user }}/.ssh"
    state: directory
    owner: "{{ new_user }}"
    group: "{{ new_user }}"
    mode: '0700'
  when: new_user is defined

- name: Deploy authorized_keys file for user
  ansible.builtin.template:
    src: authorized_keys.j2
    dest: "/home/{{ new_user }}/.ssh/authorized_keys"
    mode: '0600'
    owner: "{{ new_user }}"
    group: "{{ new_user }}"
  when: new_user is defined and ssh_keys is defined

- name: Configure sudoers for NOPASSWD
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    regexp: '^%sudo'
    line: '%sudo ALL=(ALL:ALL) NOPASSWD:ALL'
    validate: 'visudo -cf %s'
  become: true

- name: Comment out includedir in sudoers
  ansible.builtin.replace:
    path: /etc/sudoers
    regexp: '^#includedir /etc/sudoers.d'
    replace: '# #includedir /etc/sudoers.d (commented by Ansible)'
    validate: 'visudo -cf %s'
  become: true

- name: Comment out admin group sudo access
  ansible.builtin.replace:
    path: /etc/sudoers
    regexp: '^%admin ALL=\(ALL\) ALL'
    replace: '# %admin ALL=(ALL) ALL (commented by Ansible)'
    validate: 'visudo -cf %s'
  become: true

- name: Disable root login by changing shell
  ansible.builtin.user:
    name: root
    shell: /usr/sbin/nologin
  become: true

- name: Backup original sshd_config
  ansible.builtin.copy:
    src: /etc/ssh/sshd_config
    dest: /etc/ssh/sshd_config.orig
    remote_src: true
  when: not ansible_check_mode
  become: true

- name: Deploy custom sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
  notify: restart ssh
  become: true

- name: Install additional packages
  ansible.builtin.apt:
    name: "{{ additional_packages }}"
    state: present
  become: true

- name: Allow SSH port in UFW
  ansible.builtin.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp
  become: true

- name: Set UFW default incoming policy to deny
  ansible.builtin.ufw:
    direction: incoming
    default: deny
  become: true

- name: Set UFW default outgoing policy to allow
  ansible.builtin.ufw:
    direction: outgoing
    default: allow
  become: true

- name: Enable UFW
  ansible.builtin.ufw:
    state: enabled
  become: true

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
  become: true

- name: Configure fail2ban for SSH
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
  notify: restart fail2ban
  become: true
